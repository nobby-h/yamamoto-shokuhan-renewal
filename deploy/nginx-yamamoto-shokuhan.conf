# =====================================================================
# Nginx server block — new.yamamoto-shokuhan.com
# ヤマモト食販 静的サイト（Vite ビルド済み）
#
# 設置先（Ubuntu/Debian の標準パス）:
#   /etc/nginx/sites-available/yamamoto-shokuhan
#   /etc/nginx/sites-enabled/yamamoto-shokuhan -> 上記へ symlink
#
# 設置先（CentOS/AlmaLinux/Rocky 系）:
#   /etc/nginx/conf.d/yamamoto-shokuhan.conf
#
# ドキュメントルート: /var/www/yamamoto-shokuhan  （任意に変更可）
# =====================================================================

# ---------- HTTP → HTTPS リダイレクト ----------
server {
    listen 80;
    listen [::]:80;
    server_name new.yamamoto-shokuhan.com www.new.yamamoto-shokuhan.com;

    # Let's Encrypt 更新用のチャレンジパスは素通し
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://new.yamamoto-shokuhan.com$request_uri;
    }
}

# ---------- HTTPS 本体 ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name new.yamamoto-shokuhan.com;

    root /var/www/yamamoto-shokuhan;
    index index.html;

    # ---- SSL ----（Let's Encrypt / certbot で発行したパスに合わせて修正）
    ssl_certificate     /etc/letsencrypt/live/new.yamamoto-shokuhan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/new.yamamoto-shokuhan.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---- セキュリティヘッダ ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- 圧縮 ----
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml+rss;

    # ---- 旧 WordPress URL からの 301 リダイレクト ----
    # 既存サイトの構造を新HTMLに対応付け
    location = /company/        { return 301 /about.html; }
    location = /company         { return 301 /about.html; }
    location = /company/enkaku/ { return 301 /about.html#history; }
    location = /company/company/ { return 301 /about.html#company; }
    location = /company/syakun/ { return 301 /about.html#philosophy; }
    location = /service/unsou/  { return 301 /service/unsou.html; }
    location = /service/jinzai/ { return 301 /service/jinzai.html; }
    location ~ "^/service/自動車事業部/?$" { return 301 /service/jidousha.html; }
    location ~ "^/service/jidousha/?$"     { return 301 /service/jidousha.html; }
    location = /recruit/ { return 301 /recruit.html; }
    location = /news/    { return 301 /news.html; }
    location = /144-2/   { return 301 /service.html; }
    location = /kenmenu/ { return 301 /recruit.html; }

    # ---- 画像（長期キャッシュ） ----
    location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ---- 静的アセット（ハッシュ付きファイル — 永続キャッシュ） ----
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- フォント ----
    location ~* \.(woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- HTML はキャッシュさせない ----
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ---- pretty URL 解決 ----
    # /about → /about.html / /service/unsou → /service/unsou.html
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # ---- 大文字小文字を許容（任意） ----
    # 旧サイトの大文字混じりURLがあれば必要に応じて追加

    # ---- セキュリティ：隠しファイル拒否 ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
